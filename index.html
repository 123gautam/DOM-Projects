<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project_4</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">
        <div class="top">
            <div class="display">0</div>
        </div>
        <div class="btns">
            <p class="clear">C</p>
            <p class="equal" onclick="calculate()">=</p>
            <p class="nine" onclick="appendValue('9')">9</p>
            <p class="eight" onclick="appendValue('8')">8</p>
            <p class="seven" onclick="appendValue('7')">7</p>
            <p class="six" onclick="appendValue('6')">6</p>
            <p class="five" onclick="appendValue('5')">5</p>
            <p class="four" onclick="appendValue('4')">4</p>
            <p class="three" onclick="appendValue('3')">3</p>
            <p class="two" onclick="appendValue('2')">2</p>
            <p class="one" onclick="appendValue('1')">1</p>
            <p class="zero" onclick="appendValue('0')">0</p>
            <p class="plus" onclick="appendValue('+')">+</p>
            <p class="minus" onclick="appendValue('-')">-</p>
            <p class="divide" onclick="appendValue('/')">/</p>
            <p class="modulus" onclick="appendValue('%')">%</p>
            <p class="multiply" onclick="appendValue('*')">*</p>
            <p class="dot" onclick="appendValue('.')">.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
